// D=Disponible O=Ocupado R=En Reconfiguración
const nodePatterns = {

  dn2: ['O','D','O','O','R','D','O','O','D','O','O','R','D','O','O','O','D','R'],
  dn3: ['D','D','D','D','D','R','D','O','D','D','D','D','R','D','O','D'],
  dn4: ['O','O','D','O','O','R','O','D','O','O','R','O','D','O','R'],
  dn5: ['O','O','D','O','O','O','D','R','O','D','O','O','R','O','O','D','D','O','R','O'],
  dn6: ['D','D','O','R','D','D','O','D','D','R','D','O'],

const clientNames = [

  'Distribuciones Norte','FreshCo Argentina','Importex S.A.','StorageMax','DistruAR',

const initialApprovals = [
  { id:'apr1', darkNodeId:'dn1', row:5, col:1, createdBy:'user_1', createdAt:'2026-03-16', status:'pending',  notes:'Nuevo módulo habilitado tras ampliación. Capacidad: 200 m³. Temperatura controlada.' },
  { id:'apr2', darkNodeId:'dn4', row:4, col:1, createdBy:'user_3', createdAt:'2026-03-15', status:'pending',  notes:'Subdivisión del módulo R3C5. Requiere validación de planos estructurales.' },
  { id:'apr3', darkNodeId:'dn5', row:6, col:1, createdBy:'user_2', createdAt:'2026-03-14', status:'pending',  notes:'Módulo reasignado tras reconfiguración edilicia. Estado inicial: Disponible.' },
  { id:'apr4', darkNodeId:'dn2', row:2, col:4, createdBy:'user_2', createdAt:'2026-03-12', status:'approved', notes:'Cambio de capacidad nominal a 150 m³. Documentación actualizada.', reviewedAt:'2026-03-13', reviewedBy:'user_sup' },
  { id:'apr5', darkNodeId:'dn5', row:3, col:3, createdBy:'user_2', createdAt:'2026-03-10', status:'rejected', notes:'Datos de dimensiones inconsistentes con planos originales.', reviewedAt:'2026-03-11', reviewedBy:'user_sup', rejectionReason:'Las medidas no coinciden con el registro catastral del inmueble.' },

const initialNotifLog = [
  { id:'nl1',  type:'Comercial',   module:'DN-001 Palermo — Módulo R1C3',         from:'Ocupado',            to:'Disponible',         timestamp:'17/03/2026 08:42', recipients:'comercial-list@acme.com' },
  { id:'nl2',  type:'Operaciones', module:'DN-002 Belgrano — Módulo R2C5',        from:'Disponible',         to:'En Reconfiguración', timestamp:'16/03/2026 15:20', recipients:'operaciones-list@acme.com' },
  { id:'nl3',  type:'Ambos',       module:'DN-004 Córdoba Central — Módulo R1C2', from:'En Reconfiguración', to:'Ocupado',            timestamp:'16/03/2026 11:05', recipients:'operaciones-list@acme.com, comercial-list@acme.com' },
  { id:'nl4',  type:'Comercial',   module:'DN-005 Rosario Sur — Módulo R3C2',     from:'En Reconfiguración', to:'Disponible',         timestamp:'15/03/2026 09:30', recipients:'comercial-list@acme.com' },
  { id:'nl5',  type:'Operaciones', module:'DN-001 Palermo — Módulo R2C4',         from:'Ocupado',            to:'En Reconfiguración', timestamp:'14/03/2026 16:45', recipients:'operaciones-list@acme.com' },
  { id:'nl6',  type:'Ambos',       module:'DN-003 Montevideo Norte — Módulo R3C3',from:'En Reconfiguración', to:'Ocupado',            timestamp:'13/03/2026 10:15', recipients:'operaciones-list@acme.com, comercial-list@acme.com' },
  { id:'nl7',  type:'Comercial',   module:'DN-006 Santiago Centro — Módulo R2C2', from:'Ocupado',            to:'Disponible',         timestamp:'12/03/2026 14:00', recipients:'comercial-list@acme.com' },
  { id:'nl8',  type:'Operaciones', module:'DN-002 Belgrano — Módulo R1C6',        from:'Disponible',         to:'En Reconfiguración', timestamp:'11/03/2026 08:30', recipients:'operaciones-list@acme.com' },
  { id:'nl9',  type:'Ambos',       module:'DN-005 Rosario Sur — Módulo R4C1',     from:'Disponible',         to:'Ocupado',            timestamp:'10/03/2026 13:00', recipients:'operaciones-list@acme.com, comercial-list@acme.com' },
  { id:'nl10', type:'Comercial',   module:'DN-001 Palermo — Módulo R3C5',         from:'En Reconfiguración', to:'Disponible',         timestamp:'09/03/2026 17:20', recipients:'comercial-list@acme.com' },
];

// ─────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────
const S = {
  page: 'dashboard',
  dark: false,
  nodeFilter: 'all',
  moduleNodeId: 'dn1',
  approvalFilter: 'pending',
  notifTypeFilter: 'all',
  modules: [],
  approvals: [],
  notifLog: [],
  settings: {
    alertThreshold: 30,
    commercialEmail: 'comercial-list@acme.com',
    operationsEmail: 'operaciones-list@acme.com',
    syncInterval: 24,
  },
};

// ─────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────
function icons() { lucide.createIcons(); }
function getNode(id) { return darkNodes.find(n => n.id === id); }
function getUser(id) { return users.find(u => u.id === id); }
function daysSince(dateStr) { return Math.floor((TODAY - new Date(dateStr)) / 86400000); }
function isStale(node) { return daysSince(node.lastUpdated) > S.settings.alertThreshold; }
function nodeModules(nodeId) { return S.modules.filter(m => m.darkNodeId === nodeId); }
function getModuleAt(nodeId, r, c) { return S.modules.find(m => m.darkNodeId === nodeId && m.row === r && m.col === c); }
function getPendingAt(nodeId, r, c) { return S.approvals.find(a => a.darkNodeId === nodeId && a.row === r && a.col === c && a.status === 'pending'); }

function statusBg(st) {
  if (st === 'Disponible')         return 'bg-emerald-500';
  if (st === 'Ocupado')            return 'bg-red-500';
  if (st === 'En Reconfiguración') return 'bg-amber-400';
  return 'bg-gray-400';
}
function statusBadgeCls(st) {
  if (st === 'Disponible')         return 'bg-emerald-100 text-emerald-800 dark:bg-emerald-900 dark:text-emerald-300';
  if (st === 'Ocupado')            return 'bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-300';
  if (st === 'En Reconfiguración') return 'bg-amber-100 text-amber-800 dark:bg-amber-900 dark:text-amber-300';
  return 'bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-300';
}
function badge(st) { return `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${statusBadgeCls(st)}">${st}</span>`; }
function typeBadgeCls(type) {
  if (type === 'Comercial')   return 'bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-300';
  if (type === 'Operaciones') return 'bg-orange-100 text-orange-800 dark:bg-orange-900 dark:text-orange-300';
  return 'bg-purple-100 text-purple-800 dark:bg-purple-900 dark:text-purple-300';
}
function typeBadge(type) { return `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${typeBadgeCls(type)}">${type}</span>`; }
function userAvatar(userId, size='w-7 h-7') {
  const u = getUser(userId);
  if (!u) return '';
  return `<div class="${size} rounded-full ${u.color} flex items-center justify-center text-white text-xs font-bold shrink-0" title="${u.name} — ${u.role}">${u.initials}</div>`;
}
function computeStats(mods) {
  mods = mods || S.modules;
  return {
    total: mods.length,
    disp:  mods.filter(m => m.status === 'Disponible').length,
    ocup:  mods.filter(m => m.status === 'Ocupado').length,
    recon: mods.filter(m => m.status === 'En Reconfiguración').length,
  };
}
function pct(n, total) { return total ? Math.round(n / total * 100) : 0; }
function inputCls() { return 'w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500'; }
function btnPrimary() { return 'px-4 py-2 text-sm bg-gray-900 dark:bg-white text-white dark:text-gray-900 rounded-lg hover:bg-gray-700 dark:hover:bg-gray-100'; }
function btnOutline() { return 'px-4 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300'; }

function buildModules() {
  const mods = [];
  let clientIdx = 0;
  darkNodes.forEach(node => {
    const pattern = nodePatterns[node.id];
    let idx = 0;
    for (let r = 1; r <= node.rows; r++) {
      for (let c = 1; c <= node.cols; c++) {
        const code = (pattern[idx] || 'D');
        const status = code === 'D' ? 'Disponible' : code === 'O' ? 'Ocupado' : 'En Reconfiguración';
        const daysBack = Math.floor(Math.random() * 55) + 1;
        const d = new Date(TODAY); d.setDate(d.getDate() - daysBack);
        mods.push({
          id: `${node.id}-r${r}c${c}`,
          darkNodeId: node.id,
          row: r, col: c,
          status,
          client: status === 'Ocupado' ? clientNames[clientIdx++ % clientNames.length] : '',
          lastChange: d.toISOString().split('T')[0],
          notes: '',
        });
        idx++;
      }
    }
  });
  return mods;
}

// ─────────────────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────────────────
const NAV = [
  { id:'dashboard', label:'Panel Principal',   icon:'bar-chart-3' },
  { id:'nodes',     label:'Dark Nodes',        icon:'server' },
  { id:'modules',   label:'Grilla de Módulos', icon:'layout-grid' },
  { id:'approvals', label:'Aprobaciones',      icon:'check-square' },
  { id:'notifs',    label:'Notificaciones',    icon:'bell' },
  { id:'settings',  label:'Configuración',     icon:'settings' },
];

function renderSidebar() {
  const pendingCount = S.approvals.filter(a => a.status === 'pending').length;
  document.getElementById('sidebar-nav').innerHTML = NAV.map(n => {
    const active = S.page === n.id;
    const cls = active
      ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 font-semibold'
      : 'text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700';
    const badge = (n.id === 'approvals' && pendingCount > 0)
      ? `<span class="ml-auto bg-amber-500 text-white text-xs rounded-full px-1.5 py-0.5 min-w-5 text-center">${pendingCount}</span>`
      : '';
    return `<button onclick="go('${n.id}')" class="w-full flex items-center px-3 py-2 mb-0.5 text-sm rounded-lg transition-colors ${cls}">
      <i data-lucide="${n.icon}" class="w-4 h-4 mr-3 shrink-0"></i><span class="flex-1 text-left">${n.label}</span>${badge}
    </button>`;
  }).join('');
  icons();
}

// ─────────────────────────────────────────────────────
// HEADER
// ─────────────────────────────────────────────────────
const pageLabels = {
  dashboard: 'Panel Principal', nodes: 'Dark Nodes', modules: 'Grilla de Módulos',
  approvals: 'Aprobaciones', notifs: 'Notificaciones', settings: 'Configuración',
};
function renderHeader() {
  document.getElementById('hdr-breadcrumb').innerHTML =
    `<i data-lucide="server" class="w-3.5 h-3.5 mr-1"></i><span class="text-gray-400">Dark Nodes</span>
     <i data-lucide="chevron-right" class="w-3 h-3 mx-1"></i>
     <span class="text-gray-700 dark:text-gray-200 font-medium">${pageLabels[S.page] || S.page}</span>`;
  const recent = S.notifLog.slice(0, 4);
  document.getElementById('notif-list').innerHTML = recent.length
    ? recent.map(n => `<div class="p-2.5 rounded-lg bg-blue-50 dark:bg-blue-900/20 text-xs">
        <p class="font-medium text-gray-800 dark:text-gray-200 leading-snug">${n.module}</p>
        <p class="text-gray-500 dark:text-gray-400 mt-0.5">${n.from} → ${n.to}</p>
        <p class="text-gray-400 mt-1">${n.timestamp}</p>
      </div>`).join('')
    : '<p class="text-sm text-gray-500 text-center py-4">Sin notificaciones recientes</p>';
  icons();
}

// ─────────────────────────────────────────────────────
// ROUTER
// ─────────────────────────────────────────────────────
function go(page) {
  S.page = page;
  closeDrops();
  renderSidebar();
  renderHeader();
  renderPage();
}

let _charts = [];
function destroyCharts() { _charts.forEach(c => { try { c.destroy(); } catch(e){} }); _charts = []; }

function renderPage() {
  destroyCharts();
  const main = document.getElementById('main');
  switch (S.page) {
    case 'dashboard': main.innerHTML = dashboardHTML(); afterDashboard(); break;
    case 'nodes':     main.innerHTML = nodesHTML();     afterNodes();     break;
    case 'modules':   main.innerHTML = modulesHTML();   afterModules();   break;
    case 'approvals': main.innerHTML = approvalsHTML(); afterApprovals(); break;
    case 'notifs':    main.innerHTML = notifsHTML();    afterNotifs();    break;
    case 'settings':  main.innerHTML = settingsHTML();  afterSettings();  break;
  }
  icons();
}

// ─────────────────────────────────────────────────────
// DASHBOARD PAGE
// ─────────────────────────────────────────────────────
function dashboardHTML() {
  const st = computeStats();
  const staleNodes = darkNodes.filter(isStale);
  const pendingApprovals = S.approvals.filter(a => a.status === 'pending').length;

  const kpiCard = (icon, label, value, sub, color) =>

          <i data-lucide="${icon}" class="w-4 h-4 ${color.replace('bg-','text-')}"></i>
        </div>
      </div>
      <p class="text-3xl font-bold">${value}</p>
      <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">${sub}</p>
    </div>`;

  return `<div class="p-6 max-w-screen-xl mx-auto">
    <div class="mb-6">
      <h1 class="text-2xl font-bold">Panel Principal</h1>
      <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Visión global del inventario de módulos — LogiCore™</p>

function saveNewNode() {
  const name = document.getElementById('m-name').value.trim();
  const loc  = document.getElementById('m-location').value.trim();
  const rows = parseInt(document.getElementById('m-rows').value) || 3;
  const cols = parseInt(document.getElementById('m-cols').value) || 4;
  const adminId = document.getElementById('m-admin').value;
  const desc = document.getElementById('m-desc').value.trim();
  if (!name || !loc) { alert('El nombre y la ubicación son obligatorios.'); return; }
  const id = 'dn' + Date.now();
  darkNodes.push({ id, name, location: loc, rows, cols, lastUpdated: '2026-03-17', adminId, description: desc || name });
  nodePatterns[id] = Array(rows * cols).fill('D');
  closeModal(); renderPage();
}

function saveEditNode(nodeId) {
  const node = getNode(nodeId);
  node.name = document.getElementById('m-name').value.trim() || node.name;
  node.location = document.getElementById('m-location').value.trim() || node.location;
  node.rows = parseInt(document.getElementById('m-rows').value) || node.rows;
  node.cols = parseInt(document.getElementById('m-cols').value) || node.cols;
  node.adminId = document.getElementById('m-admin').value;
  node.description = document.getElementById('m-desc').value.trim() || node.description;
  node.lastUpdated = '2026-03-17';
  closeModal(); renderPage();
}

function confirmDeleteNode(nodeId) {
  const node = getNode(nodeId);
  const modCount = nodeModules(nodeId).length;
  modal('Confirmar eliminación', `
    <div class="space-y-4">
      <div class="p-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-700 rounded-lg">
        <p class="text-sm font-semibold text-red-800 dark:text-red-300">¿Eliminar <strong>${node.name}</strong>?</p>
        <p class="text-xs text-red-700 dark:text-red-400 mt-1">Esta acción eliminará el nodo y sus <strong>${modCount} módulos</strong> registrados. Esta acción no se puede deshacer.</p>
      </div>
      <div class="flex justify-end space-x-2">
        <button onclick="closeModal()" class="${btnOutline()}">Cancelar</button>
        <button onclick="deleteNode('${nodeId}')" class="px-4 py-2 text-sm bg-red-600 text-white rounded-lg hover:bg-red-700">Eliminar</button>
      </div>
    </div>`);
}

function deleteNode(nodeId) {
  const idx = darkNodes.findIndex(n => n.id === nodeId);
  if (idx > -1) darkNodes.splice(idx, 1);
  S.modules = S.modules.filter(m => m.darkNodeId !== nodeId);
  delete nodePatterns[nodeId];
  closeModal(); renderPage();
}

function modulesHTML() {
  const node = getNode(S.moduleNodeId) || darkNodes[0];
  const mods = nodeModules(node.id);
  const st = computeStats(mods);
  const stale = isStale(node);

  let gridHTML = '<div class="flex flex-wrap gap-2">';
  for (let r = 1; r <= node.rows; r++) {
    for (let c = 1; c <= node.cols; c++) {
      const mod = getModuleAt(node.id, r, c);
      const pend = !mod && getPendingAt(node.id, r, c);
      if (mod) {
        gridHTML += `<div onclick="openModuleDetail('${mod.id}')"
          class="w-14 h-14 rounded-lg mod-cell ${statusBg(mod.status)} flex flex-col items-center justify-center text-white shadow-sm"
          title="${mod.status}${mod.client ? ' — ' + mod.client : ''}">
          <span class="text-xs font-bold leading-tight">R${r}</span>
          <span class="text-xs opacity-80">C${c}</span>
        </div>`;
      } else if (pend) {
        gridHTML += `<div class="w-14 h-14 rounded-lg bg-gray-200 dark:bg-gray-600 border-2 border-dashed border-gray-400 dark:border-gray-500 flex flex-col items-center justify-center" title="Pendiente de aprobación">
          <i data-lucide="clock" class="w-4 h-4 text-gray-400"></i>
          <span class="text-xs text-gray-400 mt-0.5">PEND</span>
        </div>`;
      } else {
        gridHTML += `<div class="w-14 h-14 rounded-lg bg-gray-100 dark:bg-gray-700 border border-dashed border-gray-300 dark:border-gray-600 flex items-center justify-center">
          <span class="text-xs text-gray-300 dark:text-gray-500">—</span>
        </div>`;

function saveModuleChanges(modId) {
  const mod = S.modules.find(m => m.id === modId);
  const newStatus = document.getElementById('m-status').value;
  const client    = document.getElementById('m-client').value.trim();
  const notes     = document.getElementById('m-notes').value.trim();
  const oldStatus = mod.status;
  mod.status = newStatus;
  mod.client = client;
  mod.notes  = notes;
  mod.lastChange = '2026-03-17';
  if (newStatus !== oldStatus) {
    const node = getNode(mod.darkNodeId);
    let type = 'Comercial', recipients = S.settings.commercialEmail;
    if (newStatus === 'En Reconfiguración') { type = 'Operaciones'; recipients = S.settings.operationsEmail; }
    if (newStatus === 'Ocupado')            { type = 'Ambos'; recipients = `${S.settings.operationsEmail}, ${S.settings.commercialEmail}`; }
    S.notifLog.unshift({
      id: 'nl' + Date.now(), type,
      module: `${node.name} — Módulo R${mod.row}C${mod.col}`,
      from: oldStatus, to: newStatus,
      timestamp: new Date().toLocaleString('es-AR'),
      recipients,
    });
    node.lastUpdated = '2026-03-17';
  }
  closeModal(); renderHeader(); renderPage();
}

  modal('Solicitar Nuevo Módulo', `

function submitModuleApproval(nodeId) {
  const row   = parseInt(document.getElementById('m-row').value) || 1;
  const col   = parseInt(document.getElementById('m-col').value) || 1;
  const notes = document.getElementById('m-notes').value.trim();
  S.approvals.unshift({
    id: 'apr' + Date.now(), darkNodeId: nodeId, row, col,
    createdBy: 'user_1', createdAt: '2026-03-17',
    status: 'pending', notes: notes || 'Sin notas adicionales.',

            </td>
            <td class="px-4 py-3 text-xs text-gray-500 dark:text-gray-400">${n.timestamp}</td>
            <td class="px-4 py-3 text-center">
              <span class="px-2 py-0.5 rounded-full text-xs font-medium bg-emerald-100 text-emerald-800 dark:bg-emerald-900 dark:text-emerald-300 flex items-center w-fit mx-auto">
                <i data-lucide="check" class="w-3 h-3 mr-1"></i>Enviada
              </span>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
      ${filtered.length === 0 ? `<div class="text-center py-12 text-gray-500 dark:text-gray-400">
        <i data-lucide="bell-off" class="w-12 h-12 mx-auto mb-4 opacity-30"></i>
        <p class="font-medium">Sin notificaciones de este tipo</p>
      </div>` : ''}
    </div>
  </div>`;
}

function afterNotifs() {}

// ─────────────────────────────────────────────────────
// SETTINGS PAGE
// ─────────────────────────────────────────────────────
function settingsHTML() {
  return `<div class="p-6 max-w-2xl">
    <div class="mb-6">
      <h1 class="text-2xl font-bold">Configuración</h1>
      <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Parámetros del sistema de gestión de inventario</p>
    </div>

    <div class="space-y-5">
      <!-- Alert threshold -->
      <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-5">
        <h3 class="font-semibold flex items-center mb-1">
          <i data-lucide="alert-triangle" class="w-4 h-4 mr-2 text-amber-500"></i>Umbral de Obsolescencia
        </h3>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">Días máximos sin actualización antes de generar alerta en un Dark Node.</p>
        <div class="flex items-center space-x-4">
          <div class="flex-1">
            <input id="cfg-threshold" type="range" min="7" max="90" step="1" value="${S.settings.alertThreshold}"
              class="w-full accent-blue-600"
              oninput="document.getElementById('cfg-threshold-val').textContent=this.value">
          </div>
          <div class="text-center w-20">

          </div>
        </div>
        <p class="text-xs text-gray-500 dark:text-gray-400 mt-2">Actualmente: ${darkNodes.filter(isStale).length} nodo(s) superan el umbral de ${S.settings.alertThreshold} días</p>
      </div>

      <!-- Distribution lists -->
      <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-5">
        <h3 class="font-semibold flex items-center mb-1">
          <i data-lucide="mail" class="w-4 h-4 mr-2 text-blue-500"></i>Listas de Distribución
        </h3>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">Direcciones de correo para notificaciones automáticas por cambio de estado.</p>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 flex items-center">
              <span class="w-2 h-2 rounded-full bg-blue-500 mr-2"></span>Equipo Comercial
              <span class="ml-2 text-xs text-gray-400">(recibe alertas de estado Disponible y Ocupado)</span>
            </label>
            <input id="cfg-commercial" type="email" value="${S.settings.commercialEmail}" class="${inputCls()}">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 flex items-center">
              <span class="w-2 h-2 rounded-full bg-orange-500 mr-2"></span>Equipo de Operaciones
              <span class="ml-2 text-xs text-gray-400">(recibe alertas de estado En Reconfiguración y Ocupado)</span>
            </label>
            <input id="cfg-operations" type="email" value="${S.settings.operationsEmail}" class="${inputCls()}">
          </div>
        </div>
      </div>

      <!-- Sync settings -->
      <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-5">
        <h3 class="font-semibold flex items-center mb-1">
          <i data-lucide="refresh-cw" class="w-4 h-4 mr-2 text-emerald-500"></i>Sincronización con Warehouse
        </h3>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">Frecuencia de sincronización de datos operativos al Warehouse central para análisis de negocio.</p>
        <div class="flex items-center space-x-4">
          <div class="flex-1">
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Intervalo de sincronización</label>
            <select id="cfg-sync" class="${inputCls()}">
              ${[6,12,24,48].map(h => `<option value="${h}" ${S.settings.syncInterval===h?'selected':''}>${h}h — Cada ${h} hora${h>1?'s':''}</option>`).join('')}
            </select>
          </div>
          <div class="pt-6">
            <button onclick="triggerSync()" class="flex items-center px-4 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300">
              <i data-lucide="refresh-cw" class="w-4 h-4 mr-2"></i>Sincronizar ahora
            </button>
          </div>
        </div>
        <div class="mt-3 p-3 bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-200 dark:border-emerald-700 rounded-lg text-xs text-emerald-700 dark:text-emerald-400 flex items-center space-x-2">
          <i data-lucide="check-circle" class="w-3.5 h-3.5 shrink-0"></i>
          <span>Última sincronización exitosa: hoy 09:15 — ${S.modules.length} registros exportados al Warehouse</span>
        </div>
      </div>

      <!-- Current user info -->
      <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-5">
        <h3 class="font-semibold flex items-center mb-4">
          <i data-lucide="users" class="w-4 h-4 mr-2 text-violet-500"></i>Usuarios del Sistema
        </h3>
        <div class="space-y-3">
          ${users.map(u => `<div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-700 rounded-lg">
            <div class="flex items-center space-x-3">
              ${userAvatar(u.id,'w-8 h-8')}
              <div>
                <p class="text-sm font-medium">${u.name} ${u.id === 'user_sup' ? '<span class="text-xs text-blue-600 dark:text-blue-400 ml-1">(sesión activa)</span>' : ''}</p>
                <p class="text-xs text-gray-500 dark:text-gray-400">${u.email}</p>
              </div>
            </div>
            <span class="px-2 py-0.5 rounded-full text-xs font-medium ${u.role.includes('Supervisor') ? 'bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-300' : 'bg-gray-100 text-gray-700 dark:bg-gray-600 dark:text-gray-300'}">${u.role}</span>
          </div>`).join('')}
        </div>
      </div>

      <div class="flex justify-end">
        <button onclick="saveSettings()" class="${btnPrimary()} flex items-center">
          <i data-lucide="save" class="w-4 h-4 mr-2"></i>Guardar Configuración

}

function afterSettings() {}

function saveSettings() {
  S.settings.alertThreshold = parseInt(document.getElementById('cfg-threshold').value) || 30;
  S.settings.commercialEmail = document.getElementById('cfg-commercial').value.trim() || S.settings.commercialEmail;
  S.settings.operationsEmail = document.getElementById('cfg-operations').value.trim() || S.settings.operationsEmail;
  S.settings.syncInterval = parseInt(document.getElementById('cfg-sync').value) || 24;
  const saved = document.createElement('div');
  saved.className = 'fixed bottom-6 right-6 z-50 bg-emerald-600 text-white px-4 py-3 rounded-lg shadow-lg text-sm flex items-center space-x-2';
  saved.innerHTML = '<i data-lucide="check-circle" class="w-4 h-4"></i><span>Configuración guardada correctamente</span>';
  document.body.appendChild(saved);
  icons();
  setTimeout(() => saved.remove(), 3000);
  renderPage();
}

function triggerSync() {
  const btn = event.currentTarget;
  btn.innerHTML = '<i data-lucide="refresh-cw" class="w-4 h-4 mr-2 animate-spin"></i>Sincronizando...';
  btn.disabled = true;
  icons();
  setTimeout(() => {
    btn.innerHTML = '<i data-lucide="check" class="w-4 h-4 mr-2"></i>Sincronizado';
    btn.className = btn.className.replace('text-gray-700 dark:text-gray-300','text-emerald-600');
    icons();
    setTimeout(() => renderPage(), 1500);
  }, 1800);
}

// ─────────────────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────────────────
function modal(title, bodyHtml) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal-bg').classList.add('open');
  icons();
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }

// ─────────────────────────────────────────────────────
// DROPDOWNS
// ─────────────────────────────────────────────────────
function toggleDrop(e, id) {
  if (e && e.stopPropagation) e.stopPropagation();
  const el = document.getElementById(id);
  const wasOpen = el.classList.contains('open');
  closeDrops();
  if (!wasOpen) el.classList.add('open');
}
function closeDrops() { document.querySelectorAll('[data-drop]').forEach(el => el.classList.remove('open')); }

// ─────────────────────────────────────────────────────
// THEME
// ─────────────────────────────────────────────────────
function toggleTheme() {
  S.dark = !S.dark;
  document.documentElement.classList.toggle('dark', S.dark);
  document.getElementById('icon-theme').setAttribute('data-lucide', S.dark ? 'sun' : 'moon');
  icons();
  if (S.page === 'dashboard') { destroyCharts(); afterDashboard(); }
}

// ─────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  S.modules   = buildModules();
  S.approvals = JSON.parse(JSON.stringify(initialApprovals));
  S.notifLog  = JSON.parse(JSON.stringify(initialNotifLog));

  renderHeader();
  renderSidebar();
  renderPage();

  document.getElementById('btn-theme').addEventListener('click', toggleTheme);
  document.getElementById('btn-notif').addEventListener('click', e => { e.stopPropagation(); toggleDrop(e,'drop-notif'); });
  document.getElementById('btn-user').addEventListener('click',  e => { e.stopPropagation(); toggleDrop(e,'drop-user'); });
  document.getElementById('modal-bg').addEventListener('click',  e => { if (e.target === e.currentTarget) closeModal(); });
  document.addEventListener('click', closeDrops);
});
</script>
</body>
</html>
